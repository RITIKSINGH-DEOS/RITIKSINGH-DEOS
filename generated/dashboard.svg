<svg xmlns="http://www.w3.org/2000/svg"
    width="1600"
    height="1200"
    viewBox="0 0 1600 1200">

    <!-- Background -->
    <rect width="1600" height="1200" fill="#0d1117"/>

    <!-- Terminal Window -->
    <rect
        x="20"
        y="20"
        width="1560"
        height="1160"
        rx="16"
        fill="#0b0f14"
        stroke="#30363d"
        stroke-width="2"/>

          <!-- Terminal Header -->
    <rect
        x="20"
        y="20"
        width="1560"
        height="60"
        rx="16"
        fill="#161b22"/>

    <!-- Bottom Border -->
    <line
        x1="20"
        y1="80"
        x2="1580"
        y2="80"
        stroke="#30363d"
        stroke-width="2"/>

          <!-- Window Buttons -->
    <circle
        cx="45"
        cy="50"
        r="8"
        fill="#ff5f57"/>

    <circle
        cx="70"
        cy="50"
        r="8"
        fill="#febc2e"/>

    <circle
        cx="95"
        cy="50"
        r="8"
        fill="#28c840"/>

            <!-- Terminal Title -->
    <text
        x="130"
        y="56"
        fill="#8b949e"
        font-size="22"
        font-family="JetBrains Mono, Consolas, monospace">

        ~/ritiksingh » cat README.md

    </text>

</svg>